<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>シフカレ Live</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e5e7eb;--primary:#2563eb;--lunch:#fff1b8;--lunch-text:#8a4b00;--dinner:#dbeafe;--dinner-text:#1e40af;--both:#eadcff;--danger:#dc2626;--edit:#fff7ed;--editline:#fb923c}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}button,input,textarea,select{font:inherit}button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;background:#eef2f7;color:var(--text)}button.primary{background:var(--primary);color:#fff}button.danger{background:#fef2f2;color:var(--danger)}button:disabled{opacity:.5;cursor:not-allowed}.hidden{display:none!important}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.head{max-width:1180px;margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900;font-size:20px}.sub{font-size:12px;color:var(--muted)}.userbox{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.badge{padding:6px 9px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3}.badge.host{background:#ecfdf3;color:#047857}.modebar{max-width:1180px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}.modebar.editing{background:var(--edit);border-top:1px solid #fed7aa;border-bottom:1px solid var(--editline)}
main{max-width:1180px;margin:18px auto;padding:0 16px 40px;display:grid;grid-template-columns:340px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 18px rgba(16,24,40,.05)}.panel{padding:18px}.panel h2{margin:0 0 12px;font-size:17px}label{display:block;font-size:13px;font-weight:700;margin:12px 0 6px}input,textarea,select{width:100%;border:1px solid #cfd4dc;border-radius:10px;padding:11px 12px;background:#fff}textarea{min-height:160px;resize:vertical;line-height:1.55}.hint{font-size:12px;color:var(--muted);line-height:1.55}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.status{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:13px}.status.ok{background:#ecfdf3;color:#027a48}.status.err{background:#fef3f2;color:#b42318}
.calendar-card{overflow:hidden}.cal-head{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.cal-title{font-weight:800;font-size:20px}.nav{display:flex;gap:8px}.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}.dot.l{background:var(--lunch)}.dot.d{background:var(--dinner)}.dot.b{background:var(--both)}.weekdays,.calendar{display:grid;grid-template-columns:repeat(7,1fr)}.weekdays div{padding:9px 4px;text-align:center;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line)}.day{min-height:116px;padding:7px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff}.day:nth-child(7n){border-right:0}.day.out{background:#fafafa;color:#b2b7c1}.day.editable{cursor:pointer}.day.editable:hover{outline:2px solid #93c5fd;outline-offset:-2px}.date{font-size:12px;font-weight:700;margin-bottom:5px}.today .date{display:inline-flex;background:var(--primary);color:#fff;border-radius:999px;min-width:24px;height:24px;align-items:center;justify-content:center}.shift{font-size:11px;line-height:1.35;padding:5px 6px;border-radius:7px;margin:4px 0;overflow:hidden}.shift.lunch{background:var(--lunch);color:var(--lunch-text)}.shift.dinner{background:var(--dinner);color:var(--dinner-text)}.shift.both{background:var(--both);color:#5b21b6}.shift.editable{cursor:pointer}.shift strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.authwrap{min-height:100vh;display:grid;place-items:center;padding:20px}.authcard{width:min(460px,100%);padding:24px}.authcard h1{margin:0 0 6px}.authcard p{color:var(--muted);line-height:1.6}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:grid;place-items:center;padding:16px;z-index:50}.dialog{width:min(520px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;padding:20px}.dialog h2{margin-top:0}.history{font-size:12px;border-top:1px solid var(--line);margin-top:15px;padding-top:10px}.history-row{padding:9px 0;border-bottom:1px dashed var(--line)}
@media(max-width:820px){main{grid-template-columns:1fr}.day{min-height:90px;padding:4px}.shift{font-size:10px;padding:4px}.cal-head{align-items:flex-start;flex-direction:column}.head{align-items:flex-start}.modebar{align-items:flex-start;flex-direction:column}.sub{max-width:250px}}
</style>
</head>
<body>
<div id="setupError" class="authwrap hidden"><section class="card authcard"><h1>初期設定が必要です</h1><p><code>config.js</code> にSupabaseのURLと公開キーを設定してください。</p></section></div>
<div id="authView" class="authwrap hidden"><section class="card authcard"><h1>シフカレ Live</h1><p>登録済みのメールアドレスに、6桁の認証コードを送ります。パスワードは不要です。</p><div id="emailStep"><label>メールアドレス</label><input id="email" type="email" autocomplete="email" placeholder="name@example.com"><div class="actions"><button class="primary" id="sendOtp">認証コードを送信</button></div></div><div id="otpStep" class="hidden"><label>6桁の認証コード</label><input id="otp" inputmode="numeric" maxlength="6" placeholder="123456"><div class="actions"><button class="primary" id="verifyOtp">ログイン</button><button id="backEmail">戻る</button></div></div><div id="authStatus"></div></section></div>
<div id="appView" class="hidden">
<header><div class="head"><div><div class="brand">シフカレ Live</div><div class="sub">登録メンバー限定・リアルタイム共有</div></div><div class="userbox"><span id="userName" class="badge"></span><span id="hostBadge" class="badge host hidden">ホスト</span><button id="logoutBtn">ログアウト</button></div></div><div id="modebar" class="modebar"><div><strong id="modeText">閲覧モード</strong><div class="sub" id="modeSub">カレンダーを押すと詳細を確認できます。</div></div><button id="toggleMode" class="primary">変更モードにする</button></div></header>
<main>
<section class="card panel">
<div id="hostPanel" class="hidden"><h2>メンバー管理</h2><label>表示名</label><input id="newMemberName" placeholder="山田 花子"><label>メールアドレス</label><input id="newMemberEmail" type="email" placeholder="name@example.com"><div class="hint">ここに登録したメールアドレスだけがログインできます。</div><div class="actions"><button class="primary" id="addMember">メンバーを登録</button></div><div id="memberList" class="history"></div></div><div id="editPanel" class="hidden"><h2>シフトを一括登録</h2><label>対象メンバー</label><select id="memberSelect"></select><label>対象年</label><input id="year" type="number" min="2020" max="2100"><label>シフトボードの文章</label><textarea id="raw" placeholder="07/16（木）11:00 - 15:00"></textarea><div class="hint">貼り付けた日付について、選択したメンバーの既存シフトを上書きします。</div><div class="actions"><button class="primary" id="bulkSave">解析して登録</button></div></div>
<div><h2>変更履歴</h2><div id="history" class="history"></div></div><div id="status"></div>
</section>
<section class="card calendar-card"><div class="cal-head"><div><div class="cal-title" id="calTitle"></div><div class="legend"><span><i class="dot l"></i>ランチ</span><span><i class="dot d"></i>ディナー</span><span><i class="dot b"></i>通し</span></div></div><div class="nav"><button id="prevBtn">‹ 前月</button><button id="todayBtn">今月</button><button id="nextBtn">翌月 ›</button></div></div><div class="weekdays"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div id="calendar" class="calendar"></div></section>
</main></div>
<div id="shiftModal" class="modal hidden"><div class="dialog"><h2 id="modalTitle">シフト</h2><div id="viewShift"></div><form id="shiftForm" class="hidden"><label>メンバー</label><select id="editMember"></select><label>日付</label><input id="editDate" type="date" required><label>開始</label><input id="editStart" type="time" required><label>終了</label><input id="editEnd" type="time" required><div class="actions"><button class="primary" type="submit">保存</button><button class="danger hidden" type="button" id="deleteShift">削除</button><button type="button" class="closeModal">キャンセル</button></div></form><div id="modalActions" class="actions"><button class="closeModal">閉じる</button></div></div></div>
<script src="config.js"></script>
<script>
const $=id=>document.getElementById(id); const now=new Date(); let view=new Date(now.getFullYear(),now.getMonth(),1); let sb=null,session=null,profile=null,members=[],shifts=[],historyRows=[],editMode=false,currentShift=null,channel=null,lastActivity=Date.now();
function showStatus(msg,ok=true,target='status'){const el=$(target);el.className='status '+(ok?'ok':'err');el.textContent=msg}
function esc(v=''){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function toMin(t){const[a,b]=t.split(':').map(Number);return a*60+b}
function typeFor(s,e){const sm=toMin(s),em=toMin(e),cut=17*60;if(em<=cut)return'lunch';if(sm>=cut)return'dinner';return'both'}
function parseInput(memberId,year,text){const out=[],rx=/(\d{1,2})\s*\/\s*(\d{1,2})(?:\s*[（(][^）)]*[）)])?\s*(\d{1,2}:\d{2})\s*[-ー–—〜~～]\s*(\d{1,2}:\d{2})/;for(const row of text.split(/\r?\n/)){const m=row.match(rx);if(!m)continue;out.push({member_id:memberId,shift_date:`${year}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`,start_time:m[3],end_time:m[4]})}return out}
async function init(){if(!window.APP_CONFIG?.SUPABASE_URL||!window.APP_CONFIG?.SUPABASE_ANON_KEY){$('setupError').classList.remove('hidden');return}sb=supabase.createClient(APP_CONFIG.SUPABASE_URL,APP_CONFIG.SUPABASE_ANON_KEY);const {data}=await sb.auth.getSession();session=data.session;if(session)await enterApp();else $('authView').classList.remove('hidden');sb.auth.onAuthStateChange(async(_,s)=>{session=s;if(s&&!profile)await enterApp();if(!s){profile=null;$('appView').classList.add('hidden');$('authView').classList.remove('hidden')}})}
async function enterApp(){const {data:p,error}=await sb.from('profiles').select('*').eq('user_id',session.user.id).eq('active',true).maybeSingle();if(error||!p){await sb.auth.signOut();$('authView').classList.remove('hidden');showStatus('このメールアドレスは利用登録されていません。ホストに登録を依頼してください。',false,'authStatus');return}profile=p;$('authView').classList.add('hidden');$('appView').classList.remove('hidden');$('userName').textContent=p.display_name;$('hostBadge').classList.toggle('hidden',p.role!=='host');$('year').value=now.getFullYear();await loadAll();subscribeRealtime();render()}
async function loadAll(){const [{data:m},{data:s},{data:h}]=await Promise.all([sb.from('profiles').select('id,email,display_name,role,active').order('display_name'),sb.from('shifts').select('*').order('shift_date').order('start_time'),sb.from('shift_history').select('*,actor:actor_profile_id(display_name),target:target_profile_id(display_name)').order('created_at',{ascending:false}).limit(30)]);members=m||[];shifts=s||[];historyRows=h||[]}
function subscribeRealtime(){if(channel)sb.removeChannel(channel);channel=sb.channel('shift-live').on('postgres_changes',{event:'*',schema:'public',table:'shifts'},async()=>{await loadAll();render()}).on('postgres_changes',{event:'*',schema:'public',table:'profiles'},async()=>{await loadAll();render()}).on('postgres_changes',{event:'*',schema:'public',table:'shift_history'},async()=>{await loadAll();render()}).subscribe()}
function render(){renderMembers();renderCalendar();renderHistory();renderHostPanel();$('editPanel').classList.toggle('hidden',!editMode);$('modebar').classList.toggle('editing',editMode);$('modeText').textContent=editMode?'変更モード':'閲覧モード';$('modeSub').textContent=editMode?'全メンバーのシフトを追加・変更・削除できます。':'カレンダーを押すと詳細を確認できます。';$('toggleMode').textContent=editMode?'変更を終了する':'変更モードにする'}
function renderMembers(){const opts=members.filter(m=>m.active).map(m=>`<option value="${m.id}">${esc(m.display_name)}</option>`).join('');$('memberSelect').innerHTML=opts;$('editMember').innerHTML=opts}
function renderHostPanel(){const isHost=profile?.role==='host';$('hostPanel').classList.toggle('hidden',!isHost);if(!isHost)return;$('memberList').innerHTML=members.map(m=>`<div class="history-row"><strong>${esc(m.display_name)}</strong><br>${esc(m.email||'')} ${m.role==='host'?'（ホスト）':''}</div>`).join('')||'<div class="hint">メンバーはいません。</div>'}
function renderCalendar(){const y=view.getFullYear(),m=view.getMonth();$('calTitle').textContent=`${y}年 ${m+1}月`;const start=new Date(y,m,1-new Date(y,m,1).getDay());let html='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=fmt(d),inside=d.getMonth()===m,isToday=ds===fmt(now),items=shifts.filter(x=>x.shift_date===ds);html+=`<div class="day ${inside?'':'out'} ${isToday?'today':''} ${editMode?'editable':''}" data-date="${ds}"><div class="date">${d.getDate()}</div>${items.map(s=>{const mem=members.find(x=>x.id===s.member_id);return`<div class="shift ${typeFor(s.start_time,s.end_time)} ${editMode?'editable':''}" data-shift="${s.id}"><strong>${esc(mem?.display_name||'不明')}</strong>${s.start_time.slice(0,5)}–${s.end_time.slice(0,5)}</div>`}).join('')}</div>`}$('calendar').innerHTML=html;$('calendar').querySelectorAll('[data-shift]').forEach(el=>el.onclick=e=>{e.stopPropagation();openShift(shifts.find(s=>s.id===el.dataset.shift))});$('calendar').querySelectorAll('[data-date]').forEach(el=>el.onclick=()=>openDay(el.dataset.date))}
function renderHistory(){if(!historyRows.length){$('history').innerHTML='<div class="hint">履歴はまだありません。</div>';return}$('history').innerHTML=historyRows.map(h=>`<div class="history-row"><strong>${esc(h.actor?.display_name||'不明')}</strong> が ${esc(h.target?.display_name||'不明')} のシフトを${h.action==='insert'?'追加':h.action==='update'?'変更':'削除'}<br>${new Date(h.created_at).toLocaleString('ja-JP')}</div>`).join('')}
function openDay(date){const dayShifts=shifts.filter(s=>s.shift_date===date);if(editMode){currentShift=null;$('modalTitle').textContent='シフトを追加';$('viewShift').innerHTML='';$('viewShift').classList.add('hidden');$('shiftForm').classList.remove('hidden');$('modalActions').classList.add('hidden');$('deleteShift').classList.add('hidden');$('editDate').value=date;$('editStart').value='11:00';$('editEnd').value='15:00';$('shiftModal').classList.remove('hidden')}else{$('modalTitle').textContent=`${date} のシフト`;$('shiftForm').classList.add('hidden');$('viewShift').classList.remove('hidden');$('modalActions').classList.remove('hidden');$('viewShift').innerHTML=dayShifts.length?dayShifts.map(s=>{const m=members.find(x=>x.id===s.member_id);return`<p><strong>${esc(m?.display_name||'不明')}</strong><br>${s.start_time.slice(0,5)}〜${s.end_time.slice(0,5)}</p>`}).join(''):'<p>登録はありません。</p>';$('shiftModal').classList.remove('hidden')}}
function openShift(s){currentShift=s;const m=members.find(x=>x.id===s.member_id);$('modalTitle').textContent='シフト詳細';$('shiftModal').classList.remove('hidden');if(editMode){$('viewShift').classList.add('hidden');$('modalActions').classList.add('hidden');$('shiftForm').classList.remove('hidden');$('deleteShift').classList.remove('hidden');$('editMember').value=s.member_id;$('editDate').value=s.shift_date;$('editStart').value=s.start_time.slice(0,5);$('editEnd').value=s.end_time.slice(0,5)}else{$('shiftForm').classList.add('hidden');$('viewShift').classList.remove('hidden');$('modalActions').classList.remove('hidden');$('viewShift').innerHTML=`<p><strong>${esc(m?.display_name||'不明')}</strong><br>${s.shift_date}<br>${s.start_time.slice(0,5)}〜${s.end_time.slice(0,5)}</p>`}}
async function saveShift(e){e.preventDefault();if(!editMode)return;const payload={member_id:$('editMember').value,shift_date:$('editDate').value,start_time:$('editStart').value,end_time:$('editEnd').value};let error;if(currentShift)({error}=await sb.from('shifts').update(payload).eq('id',currentShift.id));else({error}=await sb.from('shifts').insert(payload));if(error)return showStatus(error.message,false);closeModal();showStatus('シフトを保存しました。')}
async function deleteShift(){if(!currentShift||!confirm('このシフトを削除しますか？'))return;const {error}=await sb.from('shifts').delete().eq('id',currentShift.id);if(error)return showStatus(error.message,false);closeModal();showStatus('シフトを削除しました。')}

async function addMember(){
  if(profile?.role!=='host')return;
  const display_name=$('newMemberName').value.trim();
  const email=$('newMemberEmail').value.trim().toLowerCase();
  if(!display_name||!email)return showStatus('表示名とメールアドレスを入力してください。',false);
  const {error}=await sb.from('profiles').insert({display_name,email,role:'member',active:true});
  if(error)return showStatus(error.code==='23505'?'このメールアドレスは登録済みです。':error.message,false);
  $('newMemberName').value='';$('newMemberEmail').value='';
  showStatus(`${display_name}さんを登録しました。`);
}

async function bulkSave(){if(!editMode)return;const memberId=$('memberSelect').value,year=+$('year').value,rows=parseInput(memberId,year,$('raw').value);if(!rows.length)return showStatus('シフトを読み取れませんでした。',false);const dates=[...new Set(rows.map(r=>r.shift_date))];const {error:delErr}=await sb.from('shifts').delete().eq('member_id',memberId).in('shift_date',dates);if(delErr)return showStatus(delErr.message,false);const {error}=await sb.from('shifts').insert(rows);if(error)return showStatus(error.message,false);$('raw').value='';view=new Date(year,+rows[0].shift_date.slice(5,7)-1,1);showStatus(`${rows.length}件を登録しました。`)}
function closeModal(){$('shiftModal').classList.add('hidden');currentShift=null}
$('sendOtp').onclick=async()=>{const email=$('email').value.trim();if(!email)return showStatus('メールアドレスを入力してください。',false,'authStatus');const {error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:true}});if(error)return showStatus(error.message,false,'authStatus');$('emailStep').classList.add('hidden');$('otpStep').classList.remove('hidden');showStatus('認証コードを送信しました。',true,'authStatus')};
$('verifyOtp').onclick=async()=>{const email=$('email').value.trim(),token=$('otp').value.trim();const {error}=await sb.auth.verifyOtp({email,token,type:'email'});if(error)showStatus('認証コードが正しくないか、有効期限が切れています。',false,'authStatus')};
$('backEmail').onclick=()=>{$('otpStep').classList.add('hidden');$('emailStep').classList.remove('hidden')};$('logoutBtn').onclick=()=>sb.auth.signOut();$('toggleMode').onclick=()=>{if(!editMode&&!confirm('変更モードに切り替えます。全メンバーのシフトを編集できます。'))return;editMode=!editMode;lastActivity=Date.now();render()};$('bulkSave').onclick=bulkSave;$('addMember').onclick=addMember;$('shiftForm').onsubmit=saveShift;$('deleteShift').onclick=deleteShift;document.querySelectorAll('.closeModal').forEach(b=>b.onclick=closeModal);$('shiftModal').onclick=e=>{if(e.target===$('shiftModal'))closeModal()};$('prevBtn').onclick=()=>{view.setMonth(view.getMonth()-1);renderCalendar()};$('nextBtn').onclick=()=>{view.setMonth(view.getMonth()+1);renderCalendar()};$('todayBtn').onclick=()=>{view=new Date(now.getFullYear(),now.getMonth(),1);renderCalendar()};['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>lastActivity=Date.now(),{passive:true}));setInterval(()=>{if(editMode&&Date.now()-lastActivity>5*60*1000){editMode=false;render();showStatus('5分間操作がなかったため、閲覧モードに戻りました。')}},15000);init();
</script>
</body></html>
