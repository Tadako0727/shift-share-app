<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>シフカレ Live</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e4e7ec;--blue:#2563eb;--lunch:#fff0b8;--lunch-text:#8a4b00;--dinner:#dbeafe;--dinner-text:#1e40af;--both:#eadcff;--danger:#b42318}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}button.primary{background:var(--blue);color:#fff}button.ghost{background:#eef2f7;color:var(--text)}button.danger{background:#fef3f2;color:var(--danger)}button:disabled{opacity:.5}.hidden{display:none!important}
    header{position:sticky;top:0;z-index:10;background:#ffffffee;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.head,.modebar{max-width:1180px;margin:auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-size:20px;font-weight:900}.sub,.hint{font-size:12px;color:var(--muted);line-height:1.55}.user{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.badge{padding:6px 10px;border-radius:99px;background:#eef2ff;color:#3730a3;font-size:12px}.host{background:#ecfdf3;color:#047857}.modebar.editing{background:#fff7ed;border-top:1px solid #fed7aa}
    main{max-width:1180px;margin:18px auto;padding:0 16px 40px;display:grid;grid-template-columns:330px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 18px #1018280d}.panel{padding:18px}.panel h2{font-size:17px;margin:0 0 12px}.block+.block{border-top:1px solid var(--line);margin-top:18px;padding-top:18px}label{display:block;font-size:13px;font-weight:700;margin:12px 0 6px}input,select,textarea{width:100%;padding:11px 12px;border:1px solid #cfd4dc;border-radius:10px;background:#fff}textarea{min-height:150px;resize:vertical}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.status{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:13px}.ok{background:#ecfdf3;color:#027a48}.err{background:#fef3f2;color:#b42318}
    .auth{min-height:100vh;display:grid;place-items:center;padding:20px}.auth-card{width:min(440px,100%);padding:24px}.auth-card h1{margin:0 0 6px}.cal-head{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.cal-title{font-weight:900;font-size:20px}.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:5px}.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px}.dot.l{background:var(--lunch)}.dot.d{background:var(--dinner)}.dot.b{background:var(--both)}.week,.calendar{display:grid;grid-template-columns:repeat(7,1fr)}.week div{padding:9px;text-align:center;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line)}.day{min-height:116px;padding:7px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:#fff}.day:nth-child(7n){border-right:0}.day.out{background:#fafafa;color:#b2b7c1}.day.editable{cursor:pointer}.day.editable:hover{outline:2px solid #93c5fd;outline-offset:-2px}.date{font-size:12px;font-weight:800;margin-bottom:5px}.today .date{display:inline-grid;place-items:center;background:var(--blue);color:#fff;border-radius:99px;width:24px;height:24px}.shift{font-size:11px;line-height:1.35;padding:5px 6px;border-radius:7px;margin:4px 0;overflow:hidden;cursor:pointer}.shift strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.shift.lunch{background:var(--lunch);color:var(--lunch-text)}.shift.dinner{background:var(--dinner);color:var(--dinner-text)}.shift.both{background:var(--both);color:#5b21b6}
    .modal{position:fixed;inset:0;z-index:50;background:#0f172a8c;display:grid;place-items:center;padding:16px}.dialog{width:min(520px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:16px;padding:20px}.dialog h2{margin-top:0}.history-row{font-size:12px;padding:9px 0;border-bottom:1px dashed var(--line)}
    @media(max-width:820px){main{grid-template-columns:1fr}.head,.modebar{align-items:flex-start}.day{min-height:88px;padding:4px}.shift{font-size:10px;padding:4px}.cal-head{align-items:flex-start;flex-direction:column}.week div{padding:7px 2px}}
  </style>
</head>
<body>
  <section id="authView" class="auth">
    <div class="card auth-card">
      <h1>シフカレ Live</h1>
      <p class="hint">登録済みのメールアドレスへログインリンクを送ります。パスワードは必要ありません。</p>
      <div id="emailStep"><label for="email">メールアドレス</label><input id="email" type="email" autocomplete="email" placeholder="name@example.com"><div class="actions"><button id="sendOtp" class="primary">ログインリンクを送信</button></div></div>
      <div id="authStatus"></div>
    </div>
  </section>

  <div id="appView" class="hidden">
    <header>
      <div class="head"><div><div class="brand">シフカレ Live</div><div class="sub">登録メンバー限定・リアルタイム共有</div></div><div class="user"><span id="userName" class="badge"></span><span id="hostBadge" class="badge host hidden">ホスト</span><button id="logout" class="ghost">ログアウト</button></div></div>
      <div id="modebar" class="modebar"><div><strong id="modeTitle">閲覧モード</strong><div id="modeHelp" class="sub">日付を押すと、その日のシフトを確認できます。</div></div><button id="toggleMode" class="primary">変更モードにする</button></div>
    </header>
    <main>
      <aside class="card panel">
        <section id="hostPanel" class="block hidden"><h2>メンバー管理</h2><label for="newName">表示名</label><input id="newName" placeholder="山田 花子"><label for="newEmail">メールアドレス</label><input id="newEmail" type="email" placeholder="name@example.com"><p class="hint">ここに登録したメールアドレスだけがログインできます。</p><div class="actions"><button id="addMember" class="primary">メンバーを登録</button></div><div id="memberList"></div></section>
        <section id="bulkPanel" class="block hidden"><h2>シフトを一括登録</h2><label for="memberSelect">対象メンバー</label><select id="memberSelect"></select><label for="year">対象年</label><input id="year" type="number" min="2020" max="2100"><label for="raw">シフトボードの文章</label><textarea id="raw" placeholder="07/16（木）11:00 - 15:00&#10;07/17（金）19:30 - 23:30"></textarea><p class="hint">貼り付けた日付にある同じ人のシフトを上書きします。</p><div class="actions"><button id="bulkSave" class="primary">解析して登録</button></div></section>
        <section class="block"><h2>変更履歴</h2><div id="history"><p class="hint">データベース設定後に履歴が表示されます。</p></div></section>
        <div id="status"></div>
      </aside>
      <section class="card">
        <div class="cal-head"><div><div id="calTitle" class="cal-title"></div><div class="legend"><span><i class="dot l"></i>ランチ</span><span><i class="dot d"></i>ディナー</span><span><i class="dot b"></i>通し</span></div></div><div class="actions"><button id="prev" class="ghost">‹ 前月</button><button id="today" class="ghost">今月</button><button id="next" class="ghost">翌月 ›</button></div></div>
        <div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div id="calendar" class="calendar"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden"><div class="dialog"><h2 id="modalTitle">シフト</h2><div id="viewShift"></div><form id="shiftForm" class="hidden"><label for="editMember">メンバー</label><select id="editMember"></select><label for="editDate">日付</label><input id="editDate" type="date" required><label for="editStart">開始</label><input id="editStart" type="time" required><label for="editEnd">終了</label><input id="editEnd" type="time" required><div class="actions"><button class="primary" type="submit">保存</button><button id="deleteShift" class="danger hidden" type="button">削除</button><button class="ghost close" type="button">キャンセル</button></div></form><div id="viewActions" class="actions"><button class="ghost close">閉じる</button></div></div></div>

  <script src="config.js"></script>
  <script>
    const $=id=>document.getElementById(id); const now=new Date(); let view=new Date(now.getFullYear(),now.getMonth(),1); let client,session,profile,members=[],shifts=[],editMode=false,currentShift=null,channel,lastActivity=Date.now();
    const esc=(v='')=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const dateString=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const minutes=t=>{const[a,b]=t.slice(0,5).split(':').map(Number);return a*60+b};
    const shiftType=(s,e)=>minutes(e)<=1020?'lunch':minutes(s)>=1020?'dinner':'both';
    function message(text,ok=true,target='status'){const el=$(target);el.className=`status ${ok?'ok':'err'}`;el.textContent=text}
    function parseShifts(memberId,year,text){const rows=[];const pattern=/(\d{1,2})\s*\/\s*(\d{1,2})(?:\s*[（(][^）)]*[）)])?\s*(\d{1,2}:\d{2})\s*[-–—〜~]\s*(\d{1,2}:\d{2})/;for(const line of text.split(/\r?\n/)){const m=line.match(pattern);if(m)rows.push({member_id:memberId,shift_date:`${year}-${String(+m[1]).padStart(2,'0')}-${String(+m[2]).padStart(2,'0')}`,start_time:m[3],end_time:m[4]})}return rows}
    async function init(){if(!window.APP_CONFIG?.SUPABASE_URL||!window.APP_CONFIG?.SUPABASE_ANON_KEY){message('Supabaseの接続設定がありません。',false,'authStatus');return}client=supabase.createClient(APP_CONFIG.SUPABASE_URL,APP_CONFIG.SUPABASE_ANON_KEY);const result=await client.auth.getSession();session=result.data.session;if(session)await enterApp();client.auth.onAuthStateChange(async(_,next)=>{session=next;if(next&&!profile)await enterApp();if(!next)showAuth()})}
    function showAuth(){$('appView').classList.add('hidden');$('authView').classList.remove('hidden');profile=null}
    async function enterApp(){const email=session.user.email.toLowerCase();const {data,error}=await client.from('members').select('*').eq('email',email).maybeSingle();if(error||!data){await client.auth.signOut();message('このメールアドレスは登録されていません。ホストに登録を依頼してください。',false,'authStatus');return}profile=data;$('userName').textContent=profile.name;$('hostBadge').classList.toggle('hidden',!profile.is_host);$('authView').classList.add('hidden');$('appView').classList.remove('hidden');$('year').value=now.getFullYear();await loadData();subscribe();render()}
    async function loadData(){const [m,s,h]=await Promise.all([client.from('members').select('*').order('name'),client.from('shifts').select('*').order('shift_date').order('start_time'),client.from('shift_history').select('*').order('created_at',{ascending:false}).limit(30)]);members=m.data||[];shifts=s.data||[];renderHistory(h.data||[]);if(s.error)message('Supabaseのシフト用テーブル設定が必要です。',false)}
    function renderHistory(rows){$('history').innerHTML=rows.length?rows.map(row=>`<div class="history-row"><strong>${esc(row.actor_email||'不明')}</strong> が ${esc(row.member_name||'不明')} さんのシフトを${row.action==='insert'?'追加':row.action==='update'?'変更':'削除'}<br>${new Date(row.created_at).toLocaleString('ja-JP')}</div>`).join(''):'<p class="hint">変更履歴はまだありません。</p>'}
    function subscribe(){if(channel)client.removeChannel(channel);channel=client.channel('shift-live').on('postgres_changes',{event:'*',schema:'public',table:'shifts'},async()=>{await loadData();render()}).on('postgres_changes',{event:'*',schema:'public',table:'members'},async()=>{await loadData();render()}).subscribe()}
    function render(){const options=members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');$('memberSelect').innerHTML=options;$('editMember').innerHTML=options;$('bulkPanel').classList.toggle('hidden',!editMode);$('hostPanel').classList.toggle('hidden',!profile?.is_host);$('memberList').innerHTML=members.map(m=>`<div class="history-row"><strong>${esc(m.name)}</strong>${m.is_host?'（ホスト）':''}<br>${esc(m.email)}</div>`).join('');$('modebar').classList.toggle('editing',editMode);$('modeTitle').textContent=editMode?'変更モード':'閲覧モード';$('modeHelp').textContent=editMode?'全メンバーのシフトを追加・変更・削除できます。':'日付を押すと、その日のシフトを確認できます。';$('toggleMode').textContent=editMode?'変更を終了する':'変更モードにする';renderCalendar()}
    function renderCalendar(){const y=view.getFullYear(),month=view.getMonth();$('calTitle').textContent=`${y}年 ${month+1}月`;const first=new Date(y,month,1);const start=new Date(y,month,1-first.getDay());let html='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=dateString(d);const items=shifts.filter(s=>s.shift_date===ds);html+=`<div class="day ${d.getMonth()===month?'':'out'} ${ds===dateString(now)?'today':''} ${editMode?'editable':''}" data-date="${ds}"><div class="date">${d.getDate()}</div>${items.map(s=>{const member=members.find(m=>m.id===s.member_id);return `<div class="shift ${shiftType(s.start_time,s.end_time)}" data-id="${s.id}"><strong>${esc(member?.name||'未登録')}</strong>${s.start_time.slice(0,5)}〜${s.end_time.slice(0,5)}</div>`}).join('')}</div>`}$('calendar').innerHTML=html;$('calendar').querySelectorAll('[data-id]').forEach(el=>el.onclick=e=>{e.stopPropagation();openExisting(shifts.find(s=>s.id===el.dataset.id))});$('calendar').querySelectorAll('[data-date]').forEach(el=>el.onclick=()=>openDate(el.dataset.date))}
    function openDate(date){const items=shifts.filter(s=>s.shift_date===date);$('modal').classList.remove('hidden');if(editMode){currentShift=null;$('modalTitle').textContent='シフトを追加';$('viewShift').classList.add('hidden');$('viewActions').classList.add('hidden');$('shiftForm').classList.remove('hidden');$('deleteShift').classList.add('hidden');$('editDate').value=date;$('editStart').value='11:00';$('editEnd').value='15:00'}else{$('modalTitle').textContent=`${date} のシフト`;$('shiftForm').classList.add('hidden');$('viewShift').classList.remove('hidden');$('viewActions').classList.remove('hidden');$('viewShift').innerHTML=items.length?items.map(s=>`<p><strong>${esc(members.find(m=>m.id===s.member_id)?.name||'未登録')}</strong><br>${s.start_time.slice(0,5)}〜${s.end_time.slice(0,5)}</p>`).join(''):'<p>登録はありません。</p>'}}
    function openExisting(s){currentShift=s;$('modal').classList.remove('hidden');$('modalTitle').textContent='シフト詳細';if(editMode){$('viewShift').classList.add('hidden');$('viewActions').classList.add('hidden');$('shiftForm').classList.remove('hidden');$('deleteShift').classList.remove('hidden');$('editMember').value=s.member_id;$('editDate').value=s.shift_date;$('editStart').value=s.start_time.slice(0,5);$('editEnd').value=s.end_time.slice(0,5)}else{$('shiftForm').classList.add('hidden');$('viewShift').classList.remove('hidden');$('viewActions').classList.remove('hidden');$('viewShift').innerHTML=`<p><strong>${esc(members.find(m=>m.id===s.member_id)?.name||'未登録')}</strong><br>${s.shift_date}<br>${s.start_time.slice(0,5)}〜${s.end_time.slice(0,5)}</p>`}}
    function closeModal(){$('modal').classList.add('hidden');currentShift=null}
    $('sendOtp').onclick=async()=>{const email=$('email').value.trim().toLowerCase();if(!email)return message('メールアドレスを入力してください。',false,'authStatus');$('sendOtp').disabled=true;const {error}=await client.auth.signInWithOtp({email,options:{shouldCreateUser:true,emailRedirectTo:location.origin}});if(error){$('sendOtp').disabled=false;const text=error.message.includes('rate limit')?'メール送信の上限に達しました。時間をおいてから、もう一度お試しください。':error.message;return message(text,false,'authStatus')}message('ログインリンクを送信しました。メール内のリンクを開いてください。',true,'authStatus');setTimeout(()=>$('sendOtp').disabled=false,60000)};
    $('logout').onclick=()=>client.auth.signOut();
    $('toggleMode').onclick=()=>{if(!editMode&&!confirm('変更モードでは全メンバーのシフトを編集できます。切り替えますか？'))return;editMode=!editMode;render()};
    $('addMember').onclick=async()=>{if(!profile?.is_host)return;const name=$('newName').value.trim(),email=$('newEmail').value.trim().toLowerCase();if(!name||!email)return message('表示名とメールアドレスを入力してください。',false);const {error}=await client.from('members').insert({name,email,is_host:false});if(error)return message(error.code==='23505'?'このメールアドレスは登録済みです。':error.message,false);$('newName').value='';$('newEmail').value='';await loadData();render();message(`${name}さんを登録しました。`)};
    $('shiftForm').onsubmit=async e=>{e.preventDefault();const payload={member_id:$('editMember').value,shift_date:$('editDate').value,start_time:$('editStart').value,end_time:$('editEnd').value};const result=currentShift?await client.from('shifts').update(payload).eq('id',currentShift.id):await client.from('shifts').insert(payload);if(result.error)return message(result.error.message,false);closeModal();message('シフトを保存しました。')};
    $('deleteShift').onclick=async()=>{if(!currentShift||!confirm('このシフトを削除しますか？'))return;const {error}=await client.from('shifts').delete().eq('id',currentShift.id);if(error)return message(error.message,false);closeModal();message('シフトを削除しました。')};
    $('bulkSave').onclick=async()=>{const rows=parseShifts($('memberSelect').value,+$('year').value,$('raw').value);if(!rows.length)return message('シフトを読み取れませんでした。',false);const dates=[...new Set(rows.map(r=>r.shift_date))];const removed=await client.from('shifts').delete().eq('member_id',$('memberSelect').value).in('shift_date',dates);if(removed.error)return message(removed.error.message,false);const {error}=await client.from('shifts').insert(rows);if(error)return message(error.message,false);$('raw').value='';message(`${rows.length}件のシフトを登録しました。`)};
    document.querySelectorAll('.close').forEach(b=>b.onclick=closeModal);$('modal').onclick=e=>{if(e.target===$('modal'))closeModal()};$('prev').onclick=()=>{view.setMonth(view.getMonth()-1);renderCalendar()};$('next').onclick=()=>{view.setMonth(view.getMonth()+1);renderCalendar()};$('today').onclick=()=>{view=new Date(now.getFullYear(),now.getMonth(),1);renderCalendar()};['click','keydown','touchstart'].forEach(event=>document.addEventListener(event,()=>lastActivity=Date.now(),{passive:true}));setInterval(()=>{if(editMode&&Date.now()-lastActivity>300000){editMode=false;render();message('5分間操作がなかったため、閲覧モードへ戻りました。')}},15000);init();
  </script>
</body>
</html>
